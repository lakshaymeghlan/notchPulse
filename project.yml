name: NotchPulse
options:
  bundleIdPrefix: io.notchpulse
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    CODE_SIGN_STYLE: Automatic
    DEVELOPMENT_TEAM: ""

targets:
  NotchPulse:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: io.notchpulse.app
        PRODUCT_NAME: NotchPulse
        GENERATE_INFOPLIST_FILE: true
        INFOPLIST_KEY_LSUIElement: true
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 NotchPulse. All rights reserved."
        INFOPLIST_KEY_CFBundleDisplayName: NotchPulse
        INFOPLIST_KEY_NSCameraUsageDescription: "NotchPulse shows a live camera mirror in the notch when you enable the Camera widget."
        INFOPLIST_KEY_NSCalendarsUsageDescription: "NotchPulse shows your upcoming events in the notch when you enable the Calendar widget."
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "NotchPulse shows your upcoming events in the notch when you enable the Calendar widget."
        INFOPLIST_KEY_NSAppleEventsUsageDescription: "NotchPulse reads and controls now-playing in Spotify / Apple Music for the Music widget."
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_HARDENED_RUNTIME: true
        COMBINE_HIDPI_IMAGES: true
        SWIFT_EMIT_LOC_STRINGS: false
        DEAD_CODE_STRIPPING: true
